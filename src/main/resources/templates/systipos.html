<script>
function myFunction(){
	var input,filter,div,p,a,i,txtValue;
	input = document.getElementById("todostipoinput");
	filter = input.value.toUpperCase();
	div = document.getElementById("cardtipo");
	p = div.getElementsByClassName("card mb-4 shadow-sm");
	console.log(p.length);
	for(i=0;i<p.length;i++){
		headercard = p[i].getElementsByClassName("my-0 fw-normal")[0];
		txtValue = headercard.textContent||heradercard.innerText;
		if(txtValue.toUpperCase().indexOf(filter)>-1){
			p[i].style.display="";
		}
		else{
			p[i].style.display="none";
		}
	}
}
